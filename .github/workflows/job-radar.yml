name: job-radar

on:
  schedule:
    - cron: "30 9 * * *"   # 09:30 UTC daily (~11:30 CEST) — full run with ATS discovery
  workflow_dispatch: {}        # manual run button

permissions:
  contents: write
  pages: write
  id-token: write

# Serialize Pages deployments (GitHub's recommended setup) so runs don't collide.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci || npm install
      - run: npm run build
      - name: Collect jobs
        env:
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          # Direct-ATS discovery (optional). Set BRAVE_API_KEY, or the Google CSE pair.
          BRAVE_API_KEY: ${{ secrets.BRAVE_API_KEY }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          GOOGLE_CSE_CX: ${{ secrets.GOOGLE_CSE_CX }}
          JOOBLE_API_KEY: ${{ secrets.JOOBLE_API_KEY }}
        run: npm start
      - name: Commit data
        run: |
          git config user.name "job-radar-bot"
          git config user.email "bot@users.noreply.github.com"
          git add data
          git commit -m "data: refresh $(date -u +%FT%TZ)" || echo "no changes"
          git push
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with: { path: data }

  deploy:
    needs: collect
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url || steps.deployment2.outputs.page_url }}
    steps:
      # GitHub Pages intermittently returns "Deployment failed, try again later".
      # First attempt tolerates that; the retry recovers it so the run stays green.
      - id: deployment
        uses: actions/deploy-pages@v4
        continue-on-error: true
      - name: Retry deploy on transient Pages failure
        id: deployment2
        if: steps.deployment.outcome == 'failure'
        uses: actions/deploy-pages@v4
